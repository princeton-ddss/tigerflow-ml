name: Docker

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # On a release, build from the tagged commit so the image contents match
      # the released version (the version bump is committed before tagging).
      # For a manual smoke test (workflow_dispatch), ref is empty -> default branch.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Publish only on release; a manual run is a build-only smoke test.
      - name: Log in to GHCR
        if: github.event_name == 'release'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        if: github.event_name == 'release'
        id: meta
        run: |
          VERSION=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          {
            echo "tags<<EOF"
            echo "ghcr.io/${{ github.repository }}:${VERSION}"
            echo "ghcr.io/${{ github.repository }}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ghcr.io/${{ github.repository }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (imports + task discovery)
        run: |
          docker run --rm --entrypoint python ghcr.io/${{ github.repository }}:ci \
            -c "import torch, vllm, transformers; print('imports OK', torch.__version__)"
          docker run --rm ghcr.io/${{ github.repository }}:ci tasks list

      - name: Push
        if: github.event_name == 'release'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
