name: CD

on:
  release:
    types: [published]

env:
  UV_VERSION: "0.7.15"

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and set up Python
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
          python-version-file: ".python-version"

      - name: Verify version matches tag
        run: |
          TAG_VERSION=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          PKG_VERSION=$(uv version)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch: git tag is '$TAG_VERSION' but pyproject.toml has '$PKG_VERSION'. Run 'uv version $TAG_VERSION' and push before releasing."
            exit 1
          fi

      - name: Build the package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  docs:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Checkout merge branch
        run: |
          git fetch origin
          git checkout ${{ github.ref_name }}

      - name: Install uv and set up Python
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --locked --group docs

      - name: Publish docs to gh-pages
        run: |
          cd docs
          MINOR_VERSION=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v\?\([0-9]*\.[0-9]*\).*/\1/')
          uv run mike deploy --push --update-aliases $MINOR_VERSION latest
          uv run mike set-default --push latest
